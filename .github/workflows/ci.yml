name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify dist/ is committed up to date
        run: |
          if [ -n "$(git status --porcelain dist)" ]; then
            echo "ERROR: dist/ is out of date. Run 'npm run build' locally and commit the result." >&2
            git diff dist
            exit 1
          fi
